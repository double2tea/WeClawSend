name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Validate release version
        shell: zsh {0}
        run: |
          app_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
          premiere_version="$(sed -n 's/.*ExtensionBundleVersion="\([^"]*\)".*/\1/p' premiere-cep/CSXS/manifest.xml)"
          davinci_version="$(tr -d '[:space:]' < davinci-resolve/VERSION)"

          if [[ "$GITHUB_REF_NAME" != "v$app_version" ]]; then
            print -u2 "标签与 App 版本不一致：tag=$GITHUB_REF_NAME app=$app_version"
            exit 1
          fi

          version_pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
          [[ "$app_version" =~ $version_pattern ]]
          [[ "$premiere_version" =~ $version_pattern ]]
          [[ "$davinci_version" =~ $version_pattern ]]

          expected_notes_heading="# v$app_version"
          actual_notes_heading="$(head -n 1 RELEASE_NOTES.md)"
          if [[ "$actual_notes_heading" != "$expected_notes_heading" ]]; then
            print -u2 "发布说明版本不一致：expected=$expected_notes_heading actual=$actual_notes_heading"
            exit 1
          fi

      - name: Run tests
        run: ./scripts/test.sh

      - name: Build release assets
        run: ./scripts/release.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/WeClaw-Send.zip \
            dist/WeClaw-Send.dmg \
            dist/WeClaw-Send-Premiere-CEP12.zip \
            dist/WeClaw-Send-DaVinci-Resolve.zip \
            dist/WeClaw-Send-Components.json \
            dist/SHA256SUMS.txt \
            --verify-tag \
            --notes-file RELEASE_NOTES.md \
            --title "WeClaw Send $GITHUB_REF_NAME"
