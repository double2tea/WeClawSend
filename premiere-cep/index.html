<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./js/protocol.js"></script>
    <script defer src="./js/preset-library.js"></script>
    <script defer src="./js/main.js"></script>
    <title>WeClaw Send</title>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">PREMIERE PRO · CEP 12</p>
          <h1>WeClaw Send</h1>
        </div>
        <button id="refresh-sequence" class="icon-button" type="button" title="刷新序列" aria-label="刷新序列">↻</button>
      </header>

      <section class="sequence-card">
        <span>当前序列</span>
        <strong id="sequence-name">正在读取…</strong>
      </section>

      <section class="form-section">
        <div class="label-row">
          <label for="preset-trigger">Adobe 导出预设</label>
          <button id="refresh-presets" class="compact-button" type="button">刷新</button>
        </div>
        <div id="preset-picker" class="preset-picker">
          <button id="preset-trigger" class="preset-trigger" type="button" aria-haspopup="dialog" aria-controls="preset-menu" aria-expanded="false">
            <span id="preset-value">正在扫描预设…</span>
            <span class="preset-chevron" aria-hidden="true">⌄</span>
          </button>
          <div id="preset-menu" class="preset-menu" role="dialog" aria-label="Adobe 导出预设" hidden>
            <input id="preset-search" type="search" placeholder="搜索预设" autocomplete="off" aria-label="搜索导出预设" />
            <div id="preset-options" class="preset-options"></div>
          </div>
        </div>
        <p class="path">在 Premiere 导出页调整参数并保存预设后，点击刷新</p>

        <label>输出位置</label>
        <button id="choose-folder" class="secondary-button" type="button">选择文件夹</button>
        <p id="folder-path" class="path">未选择</p>

        <label for="output-name">文件名（不含扩展名）</label>
        <input id="output-name" type="text" autocomplete="off" />
      </section>

      <section class="send-option">
        <div>
          <strong>导出完成后自动发送</strong>
          <span>需要在 WeClaw Send 设置中开启本地接口</span>
        </div>
        <label class="switch">
          <input id="auto-send" type="checkbox" aria-label="导出完成后自动发送" />
          <span aria-hidden="true"></span>
        </label>
      </section>

      <button id="export" class="primary-button" type="button">导出</button>
      <p id="status" class="status" role="status">请选择导出预设和输出位置</p>
    </main>
  </body>
</html>
